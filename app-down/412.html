  <style>
    :root {
      --color-bg-primary: #ffffff;
      --color-text-primary: #000000;
      --color-text-emphasis: #333333;
      --color-text-heading: #444444;
      --color-text-secondary: #555555;
      --color-text-subtle: #888888;
      --color-illust-ink: #263238;
      --color-illust-ink2: #263238;
      --color-illust-ink3: #263238;
      --color-illust-accent: #ff725e;
      --color-illust-surface: #e0e0e0;
      --color-illust-surface-soft: #f5f5f5;
      --color-illust-shade: #455a64;
      --color-bg-gradient-outer: #e9e9ef;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #18181b;
        --color-text-primary: #e4e4e7;
        --color-text-emphasis: #d4d4d8;
        --color-text-heading: #b8b8be;
        --color-text-secondary: #a1a1aa;
        --color-text-subtle: #71717a;
        --color-illust-ink: #cbd5e1;
        --color-illust-ink2: #202024;
        --color-illust-ink3: #35383a;
        --color-illust-accent: #ff8a75;
        --color-illust-surface: #3f3f46;
        --color-illust-surface-soft: #27272a;
        --color-illust-shade: #444a54;
        --color-bg-gradient-outer: #111114;
      }
    }

    @view-transition {
      navigation: auto;
    }

    *, *::before, *::after { box-sizing: border-box; }

    /* visually hidden but accessible to screen readers */
    .screen-readers-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vmin, 3rem);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background-color: var(--color-bg-primary);
      background-image: radial-gradient(closest-corner, var(--color-bg-primary) 50%, var(--color-bg-gradient-outer));
      color: var(--color-text-primary);
    }

    @media (max-height: 600px), (max-width: 380px) {
      html, body {
        overflow: auto;
        overscroll-behavior: auto;
      }
      body {
        height: auto;
        min-height: 100dvh;
      }
    }

    main {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 4vmin, 3rem);
      max-width: min(100%, 64rem);
      max-height: 100%;

      section.info {
        flex: 0 1 auto;
        min-width: 0;
        max-width: 50ch;
        text-align: center;
        view-transition-name: error-info;

        h1 {
          margin: 0 0 clamp(0.5rem, 2vmin, 1rem);
          font-size: clamp(2rem, 5.5vmin, 2.75rem);
          line-height: 1.15;
          text-wrap: balance;
          overflow-wrap: anywhere;
        }

        p {
          margin: 0;
          font-size: clamp(0.95rem, 2.5vmin, 1.125rem);
          line-height: 1.5;
          color: var(--color-text-secondary);
          text-wrap: pretty;
        }

        .what-might-happened {
          margin-top: clamp(1rem, 3vmin, 1.5rem);

          p {
            margin: 0 0 0.5rem;
            font-size: clamp(0.9rem, 2.3vmin, 1rem);
            color: var(--color-text-secondary);
          }

          ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: inline-flex;
            flex-direction: column;
            gap: 0.35rem;
            font-size: clamp(0.9rem, 2.3vmin, 1rem);
            color: var(--color-text-secondary);
            text-align: left;

            li {
              position: relative;
              padding-left: 1.1em;

              &::before {
                content: "›";
                position: absolute;
                left: 0;
                color: var(--color-text-subtle);
                font-weight: 700;
              }
            }
          }
        }

        nav {
          margin-top: clamp(1rem, 3vmin, 1.5rem);
          font-size: clamp(0.9rem, 2.3vmin, 1rem);
          color: var(--color-text-secondary);

          /*  */

          a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 0.2em;
            text-decoration-thickness: 1px;
            transition: text-decoration-thickness 0.15s ease;
            display: inline-block;
            padding: 0.25rem 0.1rem;

            &:hover,
            &:focus-visible {
              text-decoration-thickness: 2px;
            }

            &:focus-visible {
              outline: 2px solid currentColor;
              outline-offset: 3px;
              border-radius: 2px;
            }
          }
        }

        /*  */
      }

      figure {
        flex: 0 0 auto;
        width: min(70vmin, 20rem);
        aspect-ratio: 1 / 1;
        margin: 0;
        view-transition-name: error-illustration;

        svg, img {
          width: 100%;
          height: 100%;
          display: block;
        }
      }

      svg#pic {
        user-select: none;

        .B {fill: var(--color-illust-ink)}
        .B2 {fill: var(--color-illust-ink2)}
        .B3 {fill: var(--color-illust-ink3)}
        .C {fill: var(--color-illust-accent)}
        .D {fill: var(--color-illust-surface)}
        .E {fill: var(--color-illust-surface-soft)}
        .F {fill: var(--color-illust-shade)}
        .Z {fill: var(--color-bg-primary)}

        g.screw-right {
          animation: moveRightScrew 1s ease-in-out infinite alternate;
        }

        g.screw-left {
          animation: moveLeftScrew 1s ease-in-out infinite alternate;
        }

        .diode1 {
          animation: blink1 1.4s steps(1, end) infinite;
        }

        .diode2 {
          animation: blink2 1.6s steps(1, end) infinite;
        }

        .diode3 {
          animation: blink3 2s steps(1, end) infinite;
        }
      }
    }

    @media (min-aspect-ratio: 1/1) {
      main {
        flex-direction: row;
        align-items: center;
      }
      section {
        text-align: left;
      }
      figure {
        width: min(35vmin, 18rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }

      @view-transition {
        navigation: none;
      }

      svg#pic {
        .diode1,
        .diode2,
        .diode3 {
          opacity: 1 !important;
        }
      }
    }

    @keyframes moveLeftScrew {
      0%,100% {transform:rotate(0)}
      50%     {transform:rotate(-0.25deg)}
    }
    @keyframes moveRightScrew {
      0%,100% {transform:rotate(0)}
      50%     {transform:rotate(0.25deg)}
    }
    @keyframes blink1 {
      0%,8%    {opacity:1}
      9%,18%   {opacity:.15}
      19%,22%  {opacity:1}
      23%,30%  {opacity:.15}
      31%,38%  {opacity:1}
      39%,60%  {opacity:.15}
      61%,65%  {opacity:1}
      66%,100% {opacity:.15}
    }
    @keyframes blink2 {
      0%,4%    {opacity:1}
      5%,11%   {opacity:.15}
      12%,16%  {opacity:1}
      17%,20%  {opacity:.15}
      21%,27%  {opacity:1}
      28%,32%  {opacity:.15}
      33%,36%  {opacity:1}
      37%,44%  {opacity:.15}

      59%,63%  {opacity:1}
      64%,72%  {opacity:.15}
      73%,78%  {opacity:1}
      79%,100% {opacity:.15}
    }
    @keyframes blink3 {
      0%,5%    {opacity:1}
      6%,12%   {opacity:.15}
      13%,18%  {opacity:1}
      19%,100% {opacity:.15}
    }
  </style>
